version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: nginx-lb
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend1
      - backend2
      - backend3

  backend1:
    build: ./backend
    container_name: backend1
    environment:
      - INSTANCE_ID=1

  backend2:
    build: ./backend
    container_name: backend2
    environment:
      - INSTANCE_ID=2

  backend3:
    build: ./backend
    container_name: backend3
    environment:
      - INSTANCE_ID=3

  frontend:
    build: ./frontend
    container_name: frontend

  admin:
    build: ./admin
    container_name: admin